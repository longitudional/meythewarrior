<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: white;
  overflow: hidden;
  background: linear-gradient(270deg, #ff9a9e, #fad0c4, #a18cd1);
  background-size: 600% 600%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
}

h1 {
  font-size: 3em;
  animation: fadeIn 2s forwards;
}

h2 {
  font-weight: normal;
  animation: fadeIn 3s forwards;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: white;
  color: #ff4081;
  font-size: 1em;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* 🎂 Cake */
.cake {
  margin: 20px auto;
  width: 120px;
  height: 120px;
  position: relative;
}

.layer {
  width: 120px;
  height: 40px;
  background: #ff6b81;
  border-radius: 10px;
  position: absolute;
}

.layer:nth-child(1) { top: 60px; }
.layer:nth-child(2) { top: 30px; background: #ff8fa3; }
.layer:nth-child(3) { top: 0; background: #ffc2d1; }

.candle {
  width: 10px;
  height: 25px;
  background: white;
  position: absolute;
  top: -20px;
  left: 55px;
}

.flame {
  width: 10px;
  height: 10px;
  background: gold;
  border-radius: 50%;
  position: absolute;
  top: -10px;
  left: 0;
  animation: flicker 0.3s infinite;
}

@keyframes flicker {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* 🎈 Balloon */
.balloon {
  position: absolute;
  bottom: -100px;
  width: 40px;
  height: 50px;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  animation: floatUp 10s infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); }
  100% { transform: translateY(-120vh); }
}

</style>
</head>

<body>

<!-- 🎵 Musik -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1>🎉 Happy Birthday 🎂</h1>
  <h2 id="name">To: <b>Willa Mey Aurellia 💖</b></h2>

  <!-- 🎂 Cake -->
  <div class="cake">
    <div class="layer"></div>
    <div class="layer"></div>
    <div class="layer"></div>
    <div class="candle">
      <div class="flame"></div>
    </div>
  </div>

  <button class="btn" onclick="ubahNama()">Ganti Nama 💌</button>
</div>

<!-- 🎈 Balon -->
<div class="balloon" style="left:10%; animation-delay:0s;"></div>
<div class="balloon" style="left:30%; animation-delay:2s;"></div>
<div class="balloon" style="left:50%; animation-delay:4s;"></div>
<div class="balloon" style="left:70%; animation-delay:1s;"></div>
<div class="balloon" style="left:90%; animation-delay:3s;"></div>

<script>
function ubahNama() {
  let nama = prompt("Masukkan nama:");
  if(nama) {
    document.getElementById("name").innerHTML = "Untuk: <b>" + nama + " 💖</b>";
  }
}
</script>

</body>
</html>
